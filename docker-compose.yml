version: "3.8"

services:
  openhands:
    build:
      context: ./ 
      dockerfile: ./containers/app/Dockerfile
    image: openhands:latest
    container_name: openhands-app-${DATE:-}
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.50-nikolaik
      - WORKSPACE_MOUNT_PATH=/workspaces/ApexFrame
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: C:/Users/jayha/.openhands
        target: /.openhands
      - type: bind
        source: C:/Apps/Custom/ApexFrame
        target: /workspaces/ApexFrame
    pull_policy: build
    stdin_open: true
    tty: true
